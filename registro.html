<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Papulandia</title>
    <link rel="stylesheet" href="Estilos.css">
          
</head>
<body>

    <div class="contenedor-registro">
        <h2>Únete a Papulandia</h2>
        <p>Crea tu cuenta para guardar y subir tus propios momos</p>
        
        <form id="formulario-falso">
            <div class="campo">
                <label for="usuario">Nombre de Usuario:</label>
                <input type="text" id="usuario" placeholder="Ej: ElGrasoso99" required>
            </div>
            <div class="campo">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" placeholder="tu@correo.com" required>
            </div>
            <div class="campo">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-enviar">Registrarse</button>
        </form>
    </div>

    <script src="Script.js"></script>
</body>
</html>
